<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authorized Support</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0f172a;
    color: white;
    text-align: center;
}

.header {
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
    background: #020617;
}

.container {
    padding: 40px 20px;
}

h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

p {
    color: #cbd5e1;
    margin-bottom: 30px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin: 15px auto;
    max-width: 350px;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

.btn {
    display: block;
    margin: 15px auto;
    padding: 14px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 18px;
    color: white;
    transition: 0.3s;
    width: 90%;
    max-width: 280px;
}

.call {
    background: #22c55e;
}

.call:hover {
    background: #16a34a;
}

.info {
    font-size: 14px;
    color: #94a3b8;
    margin-top: 20px;
}

footer {
    margin-top: 40px;
    padding: 15px;
    font-size: 13px;
    background: #020617;
    color: #64748b;
}
</style>

</head>
<body>

<div class="header">
    Authorized Support
</div>

<div class="container">
    <h1>Welcome to Support Center</h1>
    <p>Hum aapki sahayata ke liye hamesha uplabdh hain</p>

    <div class="card">
        <h3>Customer Help</h3>
        <p>Direct support ke liye call kare</p>

        <a href="tel:8210866804" class="btn call">📞 Call Now</a>
    </div>

    <div class="info">
        Timing: 9 AM - 6 PM (Mon - Sat)
    </div>
</div>

<footer>
    © 2026 Authorized Support. All rights reserved.
</footer>

</body>
</html>
